<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{report title — see Framing}} — {{project}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
      mermaid.initialize({ startOnLoad: true, theme: "neutral", securityLevel: "loose" });
    </script>
    <style>
      .seam { stroke-dasharray: 4 4; }
      .leak { stroke: #dc2626; }
      .deep { background: linear-gradient(135deg, #0f172a, #1e293b); }

  <body class="bg-stone-50 text-slate-900 font-sans">
    <main class="max-w-5xl mx-auto px-6 py-12 space-y-12">
      <header>{{header — see Header}}</header>
      <section id="candidates" class="space-y-10">{{candidate cards — see Candidate card}}</section>
      <section id="top-recommendation">{{top recommendation — see Top recommendation}}</section>
    </main>
